<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BKK AIR FORCE ONE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000000; color: #ff4500; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard { max-width: 900px; margin: auto; border: 2px solid #ff4500; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(255, 69, 0, 0.4); }
        h1 { text-align: center; border-bottom: 1px solid #ff4500; padding-bottom: 10px; }
        .chart-box { background: #111; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🚀 BKK AIR FORCE ONE - 50 DISTRICTS</h1>
        <p style="text-align: center; color: #aaa;">วิเคราะห์ความสัมพันธ์: ปริมาณฝน (mm/h) และ อุณหภูมิ (°C)</p>

        <div class="chart-box">
            <canvas id="tacticalChart"></canvas>
        </div>
    </div>

    <script>
        // 1. จำลองข้อมูลตัวเลข 50 เขต (เพื่อให้กราฟขึ้นรูปให้ดูก่อน)
        const generateData = () => {
            let data = [];
            for(let i=0; i<50; i++) {
                data.push({
                    x: (Math.random() * 10 + 25).toFixed(1), // สุ่มอุณหภูมิ 25-35 องศา
                    y: (Math.random() * 15).toFixed(1)       // สุ่มฝน 0-15 mm/h
                });
            }
            return data;
        };

        // 2. สั่งวาดกราฟ
        const ctx = document.getElementById('tacticalChart').getContext('2d');
        new Chart(ctx, {
            type: 'scatter', // กราฟแบบจุด
            data: {
                datasets: [{
                    label: 'สถานะแต่ละเขต (50 จุด)',
                    data: generateData(),
                    backgroundColor: '#ff4500', // สีส้ม Tactical
                    pointRadius: 6,
                    borderColor: '#fff',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'อุณหภูมิ (°C)', color: '#ff4500' }, ticks: { color: '#aaa' } },
                    y: { title: { display: true, text: 'ปริมาณฝน (mm/h)', color: '#ff4500' }, ticks: { color: '#aaa' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    </script>
</body>
</html>
